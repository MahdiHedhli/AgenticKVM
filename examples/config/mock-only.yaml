{
  "version": "0.1",
  "providers": [
    {
      "id": "mock",
      "type": "mock",
      "enabled": true,
      "description": "Safe in-memory mock provider"
    }
  ],
  "targets": [
    {
      "id": "mock-host",
      "provider": "mock",
      "enabled": true,
      "name": "Mock Host",
      "environment": "local",
      "labels": ["mock", "safe"],
      "risk_tier": "low",
      "allowed_modes": ["Observe", "Supervised", "Full Control"],
      "metadata": {
        "description": "safe mock target"
      }
    }
  ],
  "default_policy": {
    "mode": "Supervised"
  }
}
