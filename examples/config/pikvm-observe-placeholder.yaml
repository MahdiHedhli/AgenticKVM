{
  "version": "0.1",
  "providers": [
    {
      "id": "pikvm-observe-placeholder",
      "type": "pikvm",
      "enabled": false,
      "description": "Disabled PiKVM observe-only placeholder; no live calls",
      "credential_ref": "prompt://pikvm-observe-placeholder",
      "metadata": {
        "base_url_placeholder": "https://pikvm.example.invalid",
        "connect_timeout_seconds": 2,
        "read_timeout_seconds": 5,
        "total_timeout_seconds": 10,
        "tls_verify": true,
        "allow_insecure_tls": false,
        "fixture_mode": false,
        "live_mode": false,
        "artifact_output_path": "/tmp/agentickvm-pikvm-artifacts",
        "audit_path": "/tmp/agentickvm-pikvm-audit.jsonl"
      }
    }
  ],
  "targets": [
    {
      "id": "pikvm-observe-target",
      "provider": "pikvm-observe-placeholder",
      "enabled": false,
      "name": "PiKVM Observe Placeholder",
      "environment": "lab-placeholder",
      "labels": ["pikvm", "observe-only", "placeholder"],
      "risk_tier": "high",
      "allowed_modes": ["Observe"],
      "metadata": {
        "description": "disabled observe-only placeholder"
      }
    }
  ],
  "default_policy": {
    "mode": "Observe"
  }
}
